<main class="chat-page">
  <section class="chat-shell">
    <header class="chat-header">
      <h1>Meridian Support Assistant</h1>
      <p>Connected to <code>POST /api/chat</code> on your backend.</p>
      @if (sessionId) {
        <small>Session: {{ sessionId }}</small>
      }
    </header>

    <section class="chat-messages" aria-live="polite" aria-label="Chat messages">
      @for (message of messages; track $index) {
        <article class="message" [class.user]="message.role === 'user'">
          <span class="badge">{{ message.role === 'user' ? 'You' : 'Assistant' }}</span>
          <div class="message-body" [innerHTML]="renderMarkdown(message.content)"></div>
        </article>
      }
      @if (isLoading) {
        <article class="message">
          <span class="badge">Assistant</span>
          <div class="message-body" [innerHTML]="renderMarkdown('Thinking...')"></div>
        </article>
      }
    </section>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <form class="chat-form" (ngSubmit)="sendMessage()">
      <textarea
        name="prompt"
        [(ngModel)]="prompt"
        (keydown)="sendOnEnter($event)"
        placeholder="Type your message... (Enter to send, Shift+Enter for new line)"
        rows="3"
      ></textarea>
      <button type="submit" [disabled]="isLoading || !prompt.trim()">Send</button>
    </form>
  </section>
</main>
